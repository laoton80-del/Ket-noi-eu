name: Release Discipline

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  preflight:
    name: Expo + Trust + Functions Preflight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enforce release discipline gates
        run: npm run ci:release-discipline
        env:
          CI: true
          # CI runner build có thể khác local (esbuild/order); chỉ nới strict HEAD sync của functions bundle.
          FUNCTIONS_BUNDLE_CI_RELAX_HEAD_SYNC: "1"
          # CI-only escape: bỏ parity check before/after git trạng thái cho functions/lib.
          SKIP_FUNCTIONS_BUNDLE_GIT_CHECK: "1"
